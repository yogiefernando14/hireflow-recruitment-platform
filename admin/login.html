<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireFlow Admin Login</title>

<link rel="stylesheet" href="admin.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.login-box{
width:100%;
max-width:420px;
background:#111;
padding:40px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.login-box h1{
margin-bottom:10px;
}

.login-box p{
color:#999;
margin-bottom:30px;
}

</style>

</head>
<body>

<div class="login-box">

<h1>Admin Login</h1>

<p>
Sign in to access HireFlow Dashboard
</p>

<input
type="email"
placeholder="Email">

<input
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

window.location.href=
"dashboard.html";

}

</script>

</body>
</html>
