<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs - HireFlow Admin</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}
body{
background:#0a0a0a;
color:white;
padding:40px;
}
h1{
margin-bottom:30px;
}
.jobs{
display:grid;
gap:20px;
}
.job{
background:#111;
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}
.job h2{
margin-bottom:10px;
}
.job p{
color:#999;
margin-bottom:20px;
}
.buttons{
display:flex;
gap:10px;
}
button{
padding:10px 18px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}
.edit{
background:#fff;
color:#000;
}
.delete{
background:#ff3b30;
color:white;
}
.view{
background:#333;
color:white;
}
</style>
</head>
<body>
<h1>Jobs Management</h1>
<div class="jobs">
<div class="job">
<h2>Frontend Developer</h2>
<p>Remote • Full Time</p>
<div class="buttons">
<button class="edit">Edit</button>
<button class="delete">Delete</button>
<button class="view">View</button>
</div>
</div>
<div class="job">
<h2>UI/UX Designer</h2>
<p>Hybrid • Full Time</p>
<div class="buttons">
<button class="edit">Edit</button>
<button class="delete">Delete</button>
<button class="view">View</button>
</div>
</div>
<div class="job">
<h2>Video Editor</h2>
<p>Remote • Freelance</p>
<div class="buttons">
<button class="edit">Edit</button>
<button class="delete">Delete</button>
<button class="view">View</button>
</div>
</div>
</div>
</body>
</html>
