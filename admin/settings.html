<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - HireFlow Admin</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}
body{
background:#0a0a0a;
color:white;
padding:40px;
}
h1{
margin-bottom:30px;
}
.form{
max-width:700px;
display:flex;
flex-direction:column;
gap:20px;
}
input{
padding:18px;
background:#111;
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
color:white;
}
button{
padding:18px;
border:none;
border-radius:14px;
background:white;
color:black;
font-weight:700;
cursor:pointer;
}
</style>
</head>
<body>
<h1>Settings</h1>
<div class="form">
<input type="text" value="HireFlow" placeholder="Company Name">
<input type="email" value="contact@hireflow.com" placeholder="Company Email">
<input type="text" value="+62 838 7288 0780" placeholder="Phone Number">
<input type="text" value="Indonesia" placeholder="Location">
<button>
Save Changes
</button>
</div>
</body>
</html>
